openapi: 3.1.0
info:
  title: Encrypted Data Query & Management API
  version: 0.1.0-draft
  description: |
    基于 SRS v1.0 的接口合同草案。
    所有接口默认返回 application/json，除文件上传外。
  contact:
    name: Project Team
servers:
  - url: /
    description: Local deployment

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: DataImport
  - name: Query
  - name: Records
  - name: Audit

security:
  - BearerAuth: []

paths:
  /healthz:
    get:
      tags: [Health]
      summary: 健康检查
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  time:
                    type: string
                    format: date-time

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: 用户登出
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前登录用户
      responses:
        '200':
          description: 当前用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users:
    get:
      tags: [Users]
      summary: 用户列表（仅超级管理员）
      responses:
        '200':
          description: 用户列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      summary: 创建用户（仅超级管理员）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/{userId}:
    patch:
      tags: [Users]
      summary: 更新用户角色或状态（仅超级管理员）
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Users]
      summary: 删除用户（仅超级管理员）
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/{userId}/quota:
    put:
      tags: [Users]
      summary: 设置普通用户查询配额（仅超级管理员）
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuotaUpdateRequest'
      responses:
        '200':
          description: 配额更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/data/import:
    post:
      tags: [DataImport]
      summary: 上传并创建导入任务（管理员及以上）
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: 导入任务已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/data/import/{jobId}:
    get:
      tags: [DataImport]
      summary: 查询导入任务状态
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 导入任务详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/query:
    post:
      tags: [Query]
      summary: 执行加密数据查询
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          description: 配额超限
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                quotaExceeded:
                  value:
                    code: QUOTA_EXCEEDED
                    message: 查询配额已用尽
                    trace_id: 77c0d9f5f2f34b1a

  /api/v1/records/{recordId}:
    delete:
      tags: [Records]
      summary: 删除单条记录（管理员及以上）
      parameters:
        - in: path
          name: recordId
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/audit-logs:
    get:
      tags: [Audit]
      summary: 审计日志查询（仅超级管理员）
      parameters:
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
        - in: query
          name: user_id
          schema:
            type: integer
        - in: query
          name: action_type
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: 审计日志分页结果
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidParam:
              value:
                code: INVALID_ARGUMENT
                message: 请求参数不合法
                trace_id: 67b8d10c5f1948f8
    Unauthorized:
      description: 未登录或令牌无效
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                code: UNAUTHORIZED
                message: 认证失败
                trace_id: 8e4fbeebdbd54d44
    Forbidden:
      description: 权限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                code: FORBIDDEN
                message: 无权限访问该资源
                trace_id: 3a2ee53fabff4d56
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                code: NOT_FOUND
                message: 资源不存在
                trace_id: 6f460f54b6f84607

  schemas:
    Role:
      type: string
      enum: [SUPER_ADMIN, ADMIN, USER]

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in, user]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
          nullable: true
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: access token 有效期（秒）
          example: 3600
        user:
          $ref: '#/components/schemas/UserSummary'

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: success

    UserSummary:
      type: object
      required: [id, username, role, is_active]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        is_active:
          type: boolean

    UserResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/UserSummary'

    UserProfileResponse:
      type: object
      required: [data]
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/UserSummary'
            - type: object
              properties:
                last_login_at:
                  type: string
                  format: date-time
                  nullable: true
                quota:
                  $ref: '#/components/schemas/Quota'

    UserListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'

    CreateUserRequest:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
        password:
          type: string
          minLength: 8
          maxLength: 128
        role:
          $ref: '#/components/schemas/Role'

    UpdateUserRequest:
      type: object
      properties:
        role:
          $ref: '#/components/schemas/Role'
        is_active:
          type: boolean

    Quota:
      type: object
      properties:
        daily_limit:
          type: integer
        daily_used:
          type: integer
        total_limit:
          type: integer
        total_used:
          type: integer

    QuotaUpdateRequest:
      type: object
      required: [daily_limit, total_limit]
      properties:
        daily_limit:
          type: integer
          minimum: 0
        total_limit:
          type: integer
          minimum: 0

    QuotaResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Quota'

    ImportJob:
      type: object
      required:
        - id
        - filename
        - status
        - total_rows
        - success_rows
        - skipped_rows
        - failed_rows
      properties:
        id:
          type: integer
        filename:
          type: string
        status:
          type: string
          enum: [PENDING, RUNNING, SUCCESS, FAILED, CANCELLED]
        total_rows:
          type: integer
        success_rows:
          type: integer
        skipped_rows:
          type: integer
        failed_rows:
          type: integer
        error_summary:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        finished_at:
          type: string
          format: date-time
          nullable: true

    ImportJobResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ImportJob'

    QueryRequest:
      type: object
      properties:
        name_keyword:
          type: string
          description: 姓名模糊查询词
        id_no_keyword:
          type: string
          description: 身份证号查询词；完整且有效的身份证号优先快速命中，片段查询仅适合缩小范围后的补充检索
        year_prefix:
          type: string
          pattern: '^\d{1,4}$'
          description: 年份前缀筛选，如 196 匹配 1960-1969
        year_start:
          type: integer
          minimum: 1900
          maximum: 2999
        year_end:
          type: integer
          minimum: 1900
          maximum: 2999
      allOf:
        - oneOf:
            - required: [name_keyword]
            - required: [id_no_keyword]
      description: |
        至少提供 name_keyword 或 id_no_keyword 之一。
        year_prefix/year_start/year_end 为可选附加筛选条件。
        完整且有效的身份证号优先走快速精确匹配；片段查询仅适合缩小范围后的补充检索。

    QueryRecord:
      type: object
      required: [id, name, id_no, year, match_score]
      properties:
        id:
          type: integer
        name:
          type: string
        id_no:
          type: string
        year:
          type: integer
        match_score:
          type: number
          format: float

    QueryResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/QueryRecord'
        meta:
          type: object
          properties:
            returned:
              type: integer
            capped:
              type: boolean
              description: 是否触发 100 条上限
            quota:
              $ref: '#/components/schemas/Quota'

    AuditLog:
      type: object
      required: [id, event_time, action_type, action_result]
      properties:
        id:
          type: integer
        event_time:
          type: string
          format: date-time
        user_id:
          type: integer
          nullable: true
        username:
          type: string
          nullable: true
        user_role:
          type: string
          nullable: true
        ip_address:
          type: string
          nullable: true
        action_type:
          type: string
        action_result:
          type: string
          enum: [SUCCESS, FAILED]
        target_type:
          type: string
          nullable: true
        target_id:
          type: string
          nullable: true
        detail_json:
          type: object
          additionalProperties: true
          nullable: true
        trace_id:
          type: string
          nullable: true

    AuditLogListResponse:
      type: object
      required: [data, page, page_size, total]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuditLog'
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    ErrorResponse:
      type: object
      required: [code, message, trace_id]
      properties:
        code:
          type: string
          enum:
            - INVALID_ARGUMENT
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - QUOTA_EXCEEDED
            - IMPORT_FAILED
            - INTERNAL_ERROR
        message:
          type: string
        trace_id:
          type: string
        details:
          type: object
          additionalProperties: true
          nullable: true
